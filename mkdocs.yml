site_name: FastSvelte Documentation
site_description: FastSvelte is a fullstack SaaS starter kit built with FastAPI (Python) and SvelteKit SPA. Includes session auth, Google OAuth, Stripe, multi-tenancy, and admin dashboards. Ship your Python SaaS in hours.
site_author: FastSvelte Team
site_url: https://docs.fastsvelte.dev
copyright: Copyright &copy; 2025 <a href="https://fastsvelte.dev" target="_blank">FastSvelte</a> Team

# Use directory URLs for clean paths
use_directory_urls: true

# Repository
repo_name: harunzafer/fastsvelte-docs
repo_url: https://github.com/harunzafer/fastsvelte-docs

# Configuration
dev_addr: 127.0.0.1:8001

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/harunzafer/fastsvelte-docs
      name: GitHub Repository

theme:
  name: material
  favicon: assets/images/favicon.png
  custom_dir: overrides
  logo: assets/images/logo.svg
  palette:
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

  features:
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

# Plugins
plugins:
  - search
  - meta
  - social

# Extensions
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

# Page tree
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Development Guide: development.md
  - Tutorials: tutorials.md
  - Architecture Overview: architecture-overview.md
  - B2B Mode: b2b-mode.md
  - Integrations:
      - integrations/index.md
      - Stripe: integrations/stripe.md
  - Deployment:
      - deployment/index.md
      - Azure: deployment/azure.md
      - DigitalOcean: deployment/digitalocean.md
      - Railway: deployment/railway.md
      - Fly.io: deployment/fly.md
      - AWS: deployment/aws.md
      - Google Cloud: deployment/gcp.md
      - Vercel: deployment/vercel.md
      - Netlify: deployment/netlify.md
      - Cloudflare Pages: deployment/cloudflare.md
      - Neon: deployment/neon.md
      - Supabase: deployment/supabase.md
      - Render: deployment/render.md
      - Coolify: deployment/coolify.md
      - Docker Compose: deployment/docker-compose.md
  - Getting Updates: getting-updates.md
  - Troubleshooting: troubleshooting.md

# Output directory for Vercel (will be overridden by build command)
site_dir: public
