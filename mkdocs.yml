site_name: FastSvelte Documentation
site_description: "FastSvelte is a FastAPI (Python) + SvelteKit starter kit: auth, payments, and multi-tenancy, plus AI-ready usage metering, per-plan credit allowances, and top-ups. Self-hosted, full source code, no platform lock-in. Includes generated TypeScript API clients via Orval, admin and user dashboards, and Docker Compose for local development. Supports both B2C and B2B (multi-tenant with organizations, roles, and invitations) modes."
site_author: FastSvelte Team
site_url: https://docs.fastsvelte.dev
copyright: Copyright &copy; 2025 <a href="https://fastsvelte.dev" target="_blank">FastSvelte</a> Team

# Use directory URLs for clean paths
use_directory_urls: true

# Repository
repo_name: harunzafer/fastsvelte-docs
repo_url: https://github.com/harunzafer/fastsvelte-docs

# Configuration
dev_addr: 127.0.0.1:8001

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/harunzafer/fastsvelte-docs
      name: GitHub Repository

theme:
  name: material
  favicon: assets/images/favicon.png
  custom_dir: overrides
  logo: assets/images/logo.svg
  palette:
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

  features:
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

# Plugins
plugins:
  - search
  - meta
  - social
  - llmstxt:
      full_output: llms-full.txt
      markdown_description: |
        FastSvelte is a FastAPI (Python) + SvelteKit starter kit: auth, payments, and multi-tenancy, plus AI-ready usage metering, per-plan credit allowances, and top-ups. Self-hosted, full source code, no platform lock-in. Includes generated TypeScript API clients via Orval, admin and user dashboards, and Docker Compose for local development. Supports both B2C and B2B (multi-tenant with organizations, roles, and invitations) modes.

        For the full documentation content concatenated into a single file, see [llms-full.txt](https://docs.fastsvelte.dev/llms-full.txt).
      sections:
        Get Started:
          - index.md: Quick start — what's included, prerequisites, setup, and core configuration.
        Guides:
          - guides/project-setup.md: What init.py configured, the env files, and team onboarding.
          - guides/development-workflow.md: The DB to backend to frontend change loop and API client regen.
          - guides/adding-a-feature.md: Add a new entity end-to-end (schema, repo, service, route, UI).
          - guides/metering-a-custom-feature.md: Put an action behind a per-plan limit; optional credit top-up.
          - guides/replacing-the-demo.md: Plan your app, build features, and remove the demo code.
          - guides/orval.md: Type-safe TypeScript API client generated from the OpenAPI spec.
          - guides/upgrading-dependencies.md: Dependabot policy and uv/npm upgrade workflows.
          - guides/getting-updates.md: How to pull FastSvelte updates into your fork.
        Features:
          - features/authentication.md: Session auth, email verification, password reset, roles.
          - features/google-oauth.md: Google OAuth social login setup and flow.
          - features/billing.md: Stripe subscriptions, customer portal, and webhooks.
          - features/plans-and-usage.md: Plan-defined per-feature limits and per-period usage metering.
          - features/ai.md: LLM client interface, OpenAI setup, the sample copilot, and streaming.
          - features/ai-billing.md: AI usage metering, token allotment, credit packs, and model pricing.
          - features/multi-tenancy.md: B2B mode — organizations, roles, invitations.
          - features/database.md: PostgreSQL schema, Sqitch migrations, and db_config.
          - features/email.md: Transactional email via Resend, SendGrid, or Azure.
          - features/landing-page.md: The included SEO-optimized SvelteKit landing template.
          - features/seo.md: SEO metadata, sitemaps, and robots.
          - features/admin-dashboards.md: Role-based admin and user dashboards.
          - features/security.md: Argon2 passwords, hashed sessions, RBAC, CSRF, AI spend caps.
        Deployment:
          - deployment/index.md: Deployment overview — five common setups and what every setup needs.
          - deployment/railway.md: All-in-one deploy on Railway (API + Postgres + static).
          - deployment/digitalocean.md: DigitalOcean App Platform — container + managed Postgres + static.
          - deployment/fly-neon-vercel.md: Best-of-breed — API on Fly.io, Postgres on Neon, static on Vercel.
          - deployment/azure.md: Azure — Container Apps + PostgreSQL Flexible Server + Static Web Apps.
          - deployment/self-hosting.md: Self-host the whole stack with Docker Compose.
        Reference:
          - reference/configuration.md: Backend FS_ environment variables, environments, CORS, and cron.
          - reference/architecture.md: Monorepo structure, layered backend, DI, request flow.
          - reference/troubleshooting.md: Common issues and fixes.

# Extensions
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

# Page tree
nav:
  - Quick Start: index.md
  - Guides:
      - Project Setup: guides/project-setup.md
      - Development Workflow: guides/development-workflow.md
      - Adding a Feature: guides/adding-a-feature.md
      - Metering a Custom Feature: guides/metering-a-custom-feature.md
      - Replacing the Demo: guides/replacing-the-demo.md
      - Type-Safe API Client (Orval): guides/orval.md
      - Upgrading Dependencies: guides/upgrading-dependencies.md
      - Getting Updates: guides/getting-updates.md
  - Features:
      - Authentication: features/authentication.md
      - Google OAuth: features/google-oauth.md
      - Billing & Subscriptions: features/billing.md
      - Plans & Usage: features/plans-and-usage.md
      - AI Copilot: features/ai.md
      - AI Usage & Credit Billing: features/ai-billing.md
      - Multi-Tenancy (B2B): features/multi-tenancy.md
      - Database: features/database.md
      - Transactional Email: features/email.md
      - Landing Page: features/landing-page.md
      - SEO: features/seo.md
      - Admin & User Dashboards: features/admin-dashboards.md
      - Security: features/security.md
  - Deployment:
      - deployment/index.md
      - Railway: deployment/railway.md
      - DigitalOcean: deployment/digitalocean.md
      - Fly.io + Neon + Vercel: deployment/fly-neon-vercel.md
      - Azure: deployment/azure.md
      - Self-Hosting: deployment/self-hosting.md
  - Reference:
      - Configuration: reference/configuration.md
      - Architecture: reference/architecture.md
      - Troubleshooting: reference/troubleshooting.md
  - llms.txt: /llms.txt

# Output directory for Vercel (will be overridden by build command)
site_dir: public
